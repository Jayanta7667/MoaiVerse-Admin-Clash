<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MoaiVerse Admin Clash</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

#game{
width:100vw;
height:100vh;
background:url('Background.png') center/cover no-repeat;
position:relative;
}

.hero,.enemy{
width:90px;
height:90px;
position:absolute;
bottom:120px;
border-radius:20px;
overflow:hidden;
transition:0.2s;
}

.hero img,.enemy img{
width:100%;
height:100%;
object-fit:cover;
}

.hero{
left:80px;
}

.enemy{
right:80px;
}

#heroHealth,#enemyHealth{
position:absolute;
top:20px;
width:220px;
height:20px;
background:#333;
border-radius:20px;
overflow:hidden;
}

#heroHealth{
left:20px;
}

#enemyHealth{
right:20px;
}

.bar{
height:100%;
width:100%;
background:lime;
}

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
font-size:16px;
background:#7a00ff;
color:white;
}

h1{
position:absolute;
top:45px;
width:100%;
text-align:center;
color:white;
font-size:20px;
}
</style>
</head>

<body>

<div id="game">

<h1>MOAIVERSE: ADMIN CLASH</h1>

<div id="heroHealth">
<div class="bar" id="heroBar"></div>
</div>

<div id="enemyHealth">
<div class="bar" id="enemyBar"></div>
</div>

<div class="hero" id="hero">
<img src="Hero1.png">
</div>

<div class="enemy" id="enemy">
<img src="Enemy1.png">
</div>

<div id="controls">
<button onclick="attack()">ATTACK</button>
<button onclick="changeHero()">HERO</button>
<button onclick="changeEnemy()">ENEMY</button>
</div>

</div>

<script>

let heroHP = 100;
let enemyHP = 100;

let heroIndex = 1;
let enemyIndex = 1;

function attack(){

enemyHP -= 10;

if(enemyHP < 0){
enemyHP = 0;
}

document.getElementById("enemyBar").style.width = enemyHP + "%";

document.getElementById("enemy").style.transform = "translateX(-30px)";

setTimeout(()=>{
document.getElementById("enemy").style.transform = "translateX(0px)";
},200);

if(enemyHP == 0){
alert("ENEMY DEFEATED 🔥");
enemyHP = 100;
document.getElementById("enemyBar").style.width = "100%";
}

}

function changeHero(){

heroIndex++;

if(heroIndex > 4){
heroIndex = 1;
}

document.querySelector("#hero img").src = "Hero"+heroIndex+".png";

}

function changeEnemy(){

enemyIndex++;

if(enemyIndex > 4){
enemyIndex = 1;
}

document.querySelector("#enemy img").src = "Enemy"+enemyIndex+".png";

}

</script>

</body>
</html>
