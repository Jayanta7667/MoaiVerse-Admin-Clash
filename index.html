<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoaiVerse Admin Clash</title>

<style>

body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:black;
}

#game{
width:100vw;
height:100vh;
background:url('Background.png') center center no-repeat;
background-size:cover;
position:relative;
}

.character{
position:absolute;
bottom:40px;
width:140px;
height:140px;
}

#hero{
left:20px;
}

#enemy{
right:20px;
}

.character img{
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
border:3px solid white;
}

.health{
position:absolute;
top:20px;
width:180px;
height:20px;
background:#333;
border-radius:20px;
overflow:hidden;
}

#heroHealth{
left:20px;
}

#enemyHealth{
right:20px;
}

.bar{
height:100%;
width:100%;
background:lime;
}

#controls{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
border:none;
border-radius:10px;
background:purple;
color:white;
cursor:pointer;
}

h1{
position:absolute;
top:5px;
width:100%;
text-align:center;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div id="game">

<h1>MOAIVERSE ADMIN CLASH</h1>

<div class="health" id="heroHealth">
<div class="bar" id="heroBar"></div>
</div>

<div class="health" id="enemyHealth">
<div class="bar" id="enemyBar"></div>
</div>

<div class="character" id="hero">
<img id="heroImg" src="Hero1.png">
</div>

<div class="character" id="enemy">
<img id="enemyImg" src="Enemy1.png">
</div>

<div id="controls">
<button onclick="attack()">ATTACK</button>
<button onclick="changeHero()">CHANGE HERO</button>
</div>

</div>

<script>

let enemyHp = 100;
let heroIndex = 1;

function attack(){

enemyHp -= 20;

if(enemyHp < 0){
enemyHp = 0;
}

document.getElementById("enemyBar").style.width = enemyHp + "%";

if(enemyHp === 0){

alert("Enemy Defeated!");

enemyHp = 100;

document.getElementById("enemyBar").style.width = "100%";
}
}

function changeHero(){

heroIndex++;

if(heroIndex > 4){
heroIndex = 1;
}

document.getElementById("heroImg").src = "Hero" + heroIndex + ".png";

}

</script>

</body>
</html>
