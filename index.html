<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MoaiVerse: Admin Clash</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#game{
width:100vw;
height:100vh;
background:url('Background.png') center/cover no-repeat;
position:relative;
}

.hero,.enemy{
width:140px;
height:140px;
position:absolute;
bottom:40px;
}

.hero{
left:80px;
}

.enemy{
right:80px;
}

.hero img,.enemy img{
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
}

#heroHealth,#enemyHealth{
position:absolute;
top:20px;
width:300px;
height:25px;
background:#333;
border-radius:20px;
overflow:hidden;
}

#heroHealth{
left:20px;
}

#enemyHealth{
right:20px;
}

.bar{
height:100%;
background:lime;
width:100%;
}

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
margin:5px;
cursor:pointer;
background:#8a2be2;
color:white;
}

h1{
position:absolute;
top:5px;
width:100%;
text-align:center;
color:white;
font-size:20px;
}
</style>
</head>

<body>

<div id="game">

<h1>MOAIVERSE: ADMIN CLASH</h1>

<div id="heroHealth">
<div class="bar" id="heroBar"></div>
</div>

<div id="enemyHealth">
<div class="bar" id="enemyBar"></div>
</div>

<div class="hero">
<img id="heroImg" src="Hero1.png">
</div>

<div class="enemy">
<img id="enemyImg" src="Enemy1.png">
</div>

<div id="controls">
<button onclick="attack()">ATTACK</button>
<button onclick="changeHero()">CHANGE HERO</button>
</div>

</div>

<script>

let heroHp = 100;
let enemyHp = 100;

let heroIndex = 1;
let enemyIndex = 1;

function attack(){

enemyHp -= 10;

if(enemyHp < 0){
enemyHp = 0;
}

document.getElementById("enemyBar").style.width = enemyHp + "%";

document.querySelector(".enemy").style.transform = "translateX(-30px)";

setTimeout(()=>{
document.querySelector(".enemy").style.transform = "translateX(0px)";
},200);

if(enemyHp <= 0){

alert("Enemy Defeated!");

enemyIndex++;

if(enemyIndex > 4){
enemyIndex = 1;
}

document.getElementById("enemyImg").src = "Enemy" + enemyIndex + ".png";

enemyHp = 100;

document.getElementById("enemyBar").style.width = "100%";
}
}

function changeHero(){

heroIndex++;

if(heroIndex > 4){
heroIndex = 1;
}

document.getElementById("heroImg").src = "Hero" + heroIndex + ".png";
}

</script>

</body>
</html>
